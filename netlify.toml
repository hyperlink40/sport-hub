# Netlify Configuration
# Deploy configuration for Sports Hub Betting Platform

[build]
  # Build command
  command = "npm run build"
  
  # Directory to publish
  publish = "dist"
  
  # Node version
  node_version = "18.17.0"

# Environment variables (set these in Netlify UI)
[env]
  production = {VITE_SUPABASE_URL = "", VITE_SUPABASE_ANON_KEY = "", VITE_THE_ODDS_API_KEY = ""}

# Redirects for single-page application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.the-odds-api.com https://*.supabase.co;"
    
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    
    # MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Enable XSS protection
    X-XSS-Protection = "1; mode=block"
    
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permissions policy
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache rules for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Custom error pages
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404

# Disable search indexing on preview/staging deploys
[[headers]]
  for = "/*"
  conditions = {Environment = ["deploy-preview", "branch-deploy"]}
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
