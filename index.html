<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary Meta Tags -->

    <meta name="title" content="ScoreHub - Live Sports Scores, Betting Tips & Match Analysis" />

    <meta property="twitter:title" content="ScoreHub - Live Sports Scores & Betting Platform" />
    <meta property="twitter:description" content="Real-time sports scores, AI betting predictions, and comprehensive match analysis." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=1200&h=630&fit=crop" />

    <!-- JSON-LD Structured Data -->

    {
      "@context": "https://schema.org",

      "name": "ScoreHub",
      "description": "Live sports scores, betting predictions, and match analysis platform",
      "url": "https://scorehub.example.com",
      "applicationCategory": "SportApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },

        "Live match scores",

        "Match statistics",
        "Odds tracking",
        "Betting dashboard"
      ]
    }

  </head>
